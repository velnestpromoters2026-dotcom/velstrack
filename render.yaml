services:
  - type: web
    name: velstrack-api
    env: node
    rootDir: backend
    plan: free # Recommend standard/pro for production
    region: oregon
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false # Set securely in Render dashboard
      - key: JWT_SECRET
        sync: false # Set securely in Render dashboard
      - key: META_API_VERSION
        value: v19.0
      - key: META_AD_ACCOUNT_ID
        value: act_2451174495306692
      - key: META_ACCESS_TOKEN
        sync: false # Set securely in Render dashboard
